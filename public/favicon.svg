<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202124"/>
      <stop offset="1" stop-color="#161719"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff852c"/>
      <stop offset="1" stop-color="#ff5b2e"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#ff5b2e" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="2" y="2" width="60" height="30" rx="14" fill="#ffffff" fill-opacity="0.04"/>

  <!-- terminal prompt: > _ -->
  <path d="M18 20 L32 32 L18 44" fill="none" stroke="url(#mark)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="39.5" width="15" height="7.5" rx="3.75" fill="url(#mark)"/>
</svg>
