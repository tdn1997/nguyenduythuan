<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#ff852c"/>
      <stop offset="0.55" stop-color="#ff5b2e"/>
      <stop offset="1" stop-color="#4f91ff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="30%" r="55%">
      <stop offset="0" stop-color="#ff5b2e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff5b2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="20%" r="50%">
      <stop offset="0" stop-color="#4f91ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4f91ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ff5b2e" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="630" fill="#292929"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#ff5b2e"/>

  <!-- status badge -->
  <g transform="translate(80,86)">
    <rect x="0" y="0" width="360" height="46" rx="8" fill="#301a10" fill-opacity="0.7" stroke="#ff6a1f" stroke-opacity="0.55"/>
    <circle cx="26" cy="23" r="6" fill="#ff5b2e"/>
    <text x="46" y="30" font-family="Menlo, monospace" font-size="18" letter-spacing="2" fill="#ff6a2a">SYSTEM.KERNEL :: ONLINE</text>
  </g>

  <!-- headline -->
  <text x="78" y="250" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#d9dde5">Hello, I&#39;m</text>
  <text x="74" y="330" font-family="Helvetica, Arial, sans-serif" font-size="68" font-weight="700" fill="url(#name)">Nguyen Duy Thuan</text>

  <!-- role line -->
  <text x="80" y="404" font-family="Menlo, monospace" font-size="28" fill="#ff5b2e">&lt;Architect /&gt;<tspan fill="#d9dde5"> Full Stack Engineer</tspan></text>
  <text x="80" y="446" font-family="Helvetica, Arial, sans-serif" font-size="23" fill="#9aa3b3">Distributed systems · real-time · high-performance web</text>

  <!-- tags -->
  <g font-family="Menlo, monospace" font-size="18" fill="#ff8b2a">
    <g transform="translate(80,506)"><rect width="112" height="42" rx="8" fill="#2d221d" stroke="#ff6a1f" stroke-opacity="0.35"/><text x="56" y="27" text-anchor="middle">REACT</text></g>
    <g transform="translate(206,506)"><rect width="128" height="42" rx="8" fill="#2d221d" stroke="#ff6a1f" stroke-opacity="0.35"/><text x="64" y="27" text-anchor="middle">NEXT.JS</text></g>
    <g transform="translate(348,506)"><rect width="168" height="42" rx="8" fill="#2d221d" stroke="#ff6a1f" stroke-opacity="0.35"/><text x="84" y="27" text-anchor="middle">TYPESCRIPT</text></g>
    <g transform="translate(530,506)"><rect width="96" height="42" rx="8" fill="#2d221d" stroke="#ff6a1f" stroke-opacity="0.35"/><text x="48" y="27" text-anchor="middle">JAVA</text></g>
  </g>

  <!-- terminal window -->
  <g transform="translate(760,150)">
    <rect x="0" y="0" width="360" height="330" rx="16" fill="#0e0f11" stroke="#ff5b2e" stroke-opacity="0.25"/>
    <rect x="0" y="0" width="360" height="46" rx="16" fill="#3b3b39"/>
    <rect x="0" y="24" width="360" height="22" fill="#3b3b39"/>
    <circle cx="26" cy="23" r="7" fill="#f04045"/>
    <circle cx="52" cy="23" r="7" fill="#e9b115"/>
    <circle cx="78" cy="23" r="7" fill="#17b750"/>
    <text x="332" y="29" text-anchor="end" font-family="Menlo, monospace" font-size="16" fill="#d9dde5">portfolio.tsx</text>

    <g font-family="Menlo, monospace" font-size="17" xml:space="preserve">
      <text x="26" y="92"><tspan fill="#b46cff">const </tspan><tspan fill="#ffd21f">dev</tspan><tspan fill="#cdd3dc"> = {</tspan></text>
      <text x="52" y="126"><tspan fill="#ff5b2e">name</tspan><tspan fill="#cdd3dc">: </tspan><tspan fill="#00e676">"Nguyen Duy Thuan"</tspan><tspan fill="#cdd3dc">,</tspan></text>
      <text x="52" y="160"><tspan fill="#ff5b2e">role</tspan><tspan fill="#cdd3dc">: </tspan><tspan fill="#00e676">"Full Stack Eng"</tspan><tspan fill="#cdd3dc">,</tspan></text>
      <text x="52" y="194"><tspan fill="#ff5b2e">stack</tspan><tspan fill="#cdd3dc">: [</tspan><tspan fill="#4f91ff">React</tspan><tspan fill="#cdd3dc">,</tspan></text>
      <text x="72" y="228"><tspan fill="#4f91ff">Next</tspan><tspan fill="#cdd3dc">, </tspan><tspan fill="#4f91ff">Node</tspan><tspan fill="#cdd3dc">],</tspan></text>
      <text x="52" y="262"><tspan fill="#ff5b2e">status</tspan><tspan fill="#cdd3dc">: </tspan><tspan fill="#00e676">"open"</tspan></text>
      <text x="26" y="296"><tspan fill="#cdd3dc">};</tspan><tspan fill="#ff5b2e"> _</tspan></text>
    </g>
  </g>

  <!-- footer url -->
  <text x="760" y="560" font-family="Menlo, monospace" font-size="20" fill="#7e8896">nguyenduythuan.dev</text>
</svg>
